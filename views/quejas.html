<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>Virtucan | Quejas 2º ASIR</title>
    <link rel="stylesheet" href="/deps/css/main.css">
    <script type="module" src="/deps/js/main.js"></script>
</head>

<body>
    <header class="panel">
        <svg width="30px" height="30px" viewBox="-1.7 -1.7 20.40 20.40" version="1.1" xmlns="http://www.w3.org/2000/svg"
            xmlns:xlink="http://www.w3.org/1999/xlink" fill="#000000">
            <g id="SVGRepo_bgCarrier" stroke-width="0" transform="translate(0,0), scale(1)"></g>
            <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round" stroke="#CCCCCC"
                stroke-width="0.10200000000000001"></g>
            <g id="SVGRepo_iconCarrier">
                <path
                    d="M0 0v17h17v-17h-17zM16 16h-15v-15h15v15zM4 10.232v2.768h1v-2.768c0.738-0.218 1.281-0.894
                    1.281-1.701s-0.543-1.483-1.281-1.701v-2.83h-1v2.83c-0.738 0.218-1.281 0.894-1.281 1.701s0.543 
                    1.484 1.281 1.701zM4.5 7.75c0.431 0 0.781 0.351 0.781 0.781s-0.35 0.781-0.781 0.781-0.781-0.35-0.781-0.781 
                    0.35-0.781 0.781-0.781zM8 8.107v4.893h1v-4.893c0.738-0.218 1.281-0.894 1.281-1.701s-0.543-1.483-1.281-1.701v-0.705h-1v0.705c-0.738 
                    0.218-1.281 0.894-1.281 1.701s0.543 1.484 1.281 1.701zM8.5 5.625c0.431 0 0.781 0.351 0.781 0.781s-0.35 0.782-0.781 0.782-0.781-0.351-0.781-0.782 
                    0.35-0.781 0.781-0.781zM12.5 13.417c0.982 0 1.781-0.799 1.781-1.781 0-0.808-0.543-1.483-1.281-1.701v-5.935h-1v5.935c-0.738 0.218-1.281 0.894-1.281 
                    1.701 0 0.982 0.799 1.781 1.781 1.781zM12.5 10.854c0.431 0 0.781 0.351 0.781 0.781s-0.351 0.781-0.781 0.781-0.781-0.351-0.781-0.781 0.35-0.781 0.781-0.781z"
                    fill="currentColor">
                </path>
            </g>
        </svg>
    </header>
    <form method="post" class="formulario">
        <input type="text" name="email" id="inp_email" placeholder="Email (opcional)">
        <select name="motivo" id="inp_motivo">
            <option value="queja">Queja</option>
            <option value="sugerencia">Sugerencia</option>
            <option value="otro">Otro</option>
        </select>
        <select name="ambito" id="inp_queja">
            <option value="general">General</option>
            <option value="asignatura">Asignatura Concreta</option>
        </select>
        <select name="asignatura" id="inp_asignatura">
            <option value="SRD">SRD</option>
            <option value="SGY">SGY</option>
            <option value="ADE">ADE</option>
            <option value="ADD">ADD</option>
            <option value="IMW">IMW</option>
            <option value="EMR">EMR</option>
        </select>
        <input type="text" name="titulo" id="inp_titulo" placeholder="Título">
        <textarea name="cuerpo" id="inp_cuerpo" spellcheck="false" autocomplete="false"
            placeholder="Escribe aquí algo..."></textarea>
        <input multiple type="file" name="files" id="inp_file" hidden>
        <div class="normas">
            <span class="signo">!</span>
            <span>Máximo 2MB (png, jpeg, jpg)</span>
        </div>
        <div class="drop-area">
            <button type="button" class="add_file">
                <span>
                    Añadir adjuntos
                </span>
            </button>
        </div>
        <button type="button" id="inp_btn">
            <span>Enviar</span>
        </button>
    </form>
</body>

</html>
